<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Allow pinch-zoom (do not cap maximum-scale) for low-vision users -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply saved accessibility settings before first paint to avoid a flash -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem("fpp.a11y") || "{}");
          var el = document.documentElement;
          el.setAttribute("data-text-scale", s.textScale || "normal");
          el.classList.toggle("a11y-contrast", !!s.contrast);
          el.classList.toggle("a11y-grayscale", !!s.grayscale);
          el.classList.toggle("a11y-reduce-motion", !!s.reduceMotion);
        } catch (e) {}
      })();
    </script>
    <title>Fall Prevention Plan</title>
    <meta name="description" content="Fall Prevention Plan — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Fall Prevention Plan" />
    <meta property="og:description" content="Fall Prevention Plan — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fall Prevention Plan" />
    <meta name="twitter:description" content="Fall Prevention Plan — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
